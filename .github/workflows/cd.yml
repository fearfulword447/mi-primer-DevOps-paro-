name: CD — Despliegue Continuo

on:
  push:
    tags:
      - 'v*.*.*'   # El CD solo se activa cuando creas un tag de versión (ej: v1.0.0)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write      # Permite publicar en el registro de GitHub (GHCR)
  security-events: write # Permite que Trivy publique reportes en la pestaña Security

jobs:
  build-and-push:
    name: Build y publicar imagen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extraer metadatos (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            
      - name: Build y push de imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: true

  trivy-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build-and-push # Espera a que la imagen se construya primero
    steps:
      - uses: actions/checkout@v4
      
      - name: Construir imagen Docker
        run: docker build -t app-demo:${{ github.sha }} .
        
      - name: Escanear con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app-demo:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          
      - name: Publicar resultados en Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.safir'

  deploy-staging:
    name: Desplegar en Staging
    runs-on: ubuntu-latest
    needs: trivy-scan # Solo avanza si el escaneo de seguridad terminó
    environment: staging
    steps:
      - name: Deploy a staging
        run: echo 'Desplegando versión ${{ github.ref_name }} en staging...'

  deploy-production:
    name: Desplegar en Producción
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production # Activa tu candado de aprobación manual
    steps:
      - name: Deploy a producción
        run: echo 'Desplegando versión ${{ github.ref_name }} en producción...'